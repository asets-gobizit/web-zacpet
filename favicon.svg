<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- ZacPet brand favicon: coral rounded square + two bold white paw prints (no text — unreadable at 16x16) -->
  <rect width="100" height="100" rx="22" fill="#FF7A59"/>
  <g fill="#FFFFFF">
    <!-- LEFT PAW -->
    <!-- main pad -->
    <ellipse cx="32" cy="68" rx="13" ry="10"/>
    <!-- 4 toe beans, fanned out above the pad -->
    <ellipse cx="16" cy="46" rx="5" ry="7" transform="rotate(-22 16 46)"/>
    <ellipse cx="26" cy="36" rx="5" ry="7" transform="rotate(-8 26 36)"/>
    <ellipse cx="38" cy="36" rx="5" ry="7" transform="rotate(8 38 36)"/>
    <ellipse cx="48" cy="46" rx="5" ry="7" transform="rotate(22 48 46)"/>

    <!-- RIGHT PAW -->
    <ellipse cx="68" cy="68" rx="13" ry="10"/>
    <ellipse cx="52" cy="46" rx="5" ry="7" transform="rotate(-22 52 46)"/>
    <ellipse cx="62" cy="36" rx="5" ry="7" transform="rotate(-8 62 36)"/>
    <ellipse cx="74" cy="36" rx="5" ry="7" transform="rotate(8 74 36)"/>
    <ellipse cx="84" cy="46" rx="5" ry="7" transform="rotate(22 84 46)"/>
  </g>
</svg>
