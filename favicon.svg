<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- ZacPet brand favicon: coral rounded square + two black paw prints,
       toes fanned out naturally (each rotated outward), shifted toward
       center while keeping a clear diagonal gap between the paws -->
  <rect width="100" height="100" rx="22" fill="#FF7A59"/>

  <!-- UPPER-LEFT PAW (slightly bigger — foreground) -->
  <g fill="#1a1a1a" transform="translate(12 10)">
    <!-- main pad: wider, slightly heart-ish (rx>ry) -->
    <ellipse cx="18" cy="30" rx="13" ry="9"/>
    <!-- 4 toe beans, fanned out — outer toes tilted more, inner toes upright-ish -->
    <ellipse cx="3"  cy="16" rx="4" ry="6" transform="rotate(-28 3 16)"/>
    <ellipse cx="11" cy="4"  rx="4" ry="6" transform="rotate(-10 11 4)"/>
    <ellipse cx="25" cy="4"  rx="4" ry="6" transform="rotate(10 25 4)"/>
    <ellipse cx="33" cy="16" rx="4" ry="6" transform="rotate(28 33 16)"/>
  </g>

  <!-- LOWER-RIGHT PAW (slightly smaller — background, like a second step) -->
  <g fill="#1a1a1a" transform="translate(53 53)">
    <ellipse cx="16" cy="27" rx="11.5" ry="8"/>
    <ellipse cx="3"  cy="14" rx="3.5" ry="5.5" transform="rotate(-28 3 14)"/>
    <ellipse cx="10" cy="3"  rx="3.5" ry="5.5" transform="rotate(-10 10 3)"/>
    <ellipse cx="22" cy="3"  rx="3.5" ry="5.5" transform="rotate(10 22 3)"/>
    <ellipse cx="29" cy="14" rx="3.5" ry="5.5" transform="rotate(28 29 14)"/>
  </g>
</svg>
