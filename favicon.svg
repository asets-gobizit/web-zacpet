<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- ZacPet brand favicon: rounded coral square + two white paw prints + ZacPet wordmark -->
  <rect width="100" height="100" rx="22" fill="#FF7A59"/>
  <g fill="#FFFFFF">
    <!-- LEFT PAW -->
    <ellipse cx="30" cy="44" rx="8" ry="6"/>
    <ellipse cx="21" cy="32" rx="3.2" ry="4.2" transform="rotate(-15 21 32)"/>
    <ellipse cx="28" cy="26" rx="3.2" ry="4.2"/>
    <ellipse cx="36" cy="26" rx="3.2" ry="4.2"/>
    <ellipse cx="40" cy="34" rx="3.2" ry="4.2" transform="rotate(15 40 34)"/>

    <!-- RIGHT PAW -->
    <ellipse cx="70" cy="44" rx="8" ry="6"/>
    <ellipse cx="60" cy="34" rx="3.2" ry="4.2" transform="rotate(-15 60 34)"/>
    <ellipse cx="64" cy="26" rx="3.2" ry="4.2"/>
    <ellipse cx="72" cy="26" rx="3.2" ry="4.2"/>
    <ellipse cx="79" cy="32" rx="3.2" ry="4.2" transform="rotate(15 79 32)"/>
  </g>

  <!-- ZacPet wordmark -->
  <text x="50" y="80"
        font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif"
        font-size="22" font-weight="900" fill="#FFFFFF"
        text-anchor="middle" letter-spacing="-0.5">ZacPet</text>
</svg>
