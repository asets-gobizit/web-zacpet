<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- ZacPet brand favicon: coral rounded square + two BLACK paw prints
       arranged like a pet walking diagonally (staggered, not symmetric) -->
  <rect width="100" height="100" rx="22" fill="#FF7A59"/>

  <!-- LOWER-LEFT PAW (slightly larger, foreground) -->
  <g fill="#1a1a1a" transform="translate(18 38) rotate(-8)">
    <!-- main pad -->
    <ellipse cx="20" cy="30" rx="11" ry="8.5"/>
    <!-- 4 toe beans, fanned out above the pad -->
    <ellipse cx="6"  cy="14" rx="4.2" ry="6" transform="rotate(-22 6 14)"/>
    <ellipse cx="14" cy="6"  rx="4.2" ry="6" transform="rotate(-8 14 6)"/>
    <ellipse cx="26" cy="6"  rx="4.2" ry="6" transform="rotate(8 26 6)"/>
    <ellipse cx="34" cy="14" rx="4.2" ry="6" transform="rotate(22 34 14)"/>
  </g>

  <!-- UPPER-RIGHT PAW (slightly smaller, behind/up — gives "walking" feel) -->
  <g fill="#1a1a1a" transform="translate(48 8) rotate(8)">
    <!-- main pad -->
    <ellipse cx="20" cy="30" rx="9" ry="7"/>
    <!-- 4 toe beans -->
    <ellipse cx="8"  cy="16" rx="3.5" ry="5" transform="rotate(-22 8 16)"/>
    <ellipse cx="15" cy="9"  rx="3.5" ry="5" transform="rotate(-8 15 9)"/>
    <ellipse cx="25" cy="9"  rx="3.5" ry="5" transform="rotate(8 25 9)"/>
    <ellipse cx="32" cy="16" rx="3.5" ry="5" transform="rotate(22 32 16)"/>
  </g>
</svg>
